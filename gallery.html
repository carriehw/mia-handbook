<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>用例藝廊 · Mia 團隊說明書</title>
<link rel="stylesheet" href="assets/site.css">
</head>
<body>
<div class="page">
  <header class="hero">
    <div class="eyebrow">用例藝廊 · Use-case Gallery</div>
    <h1>我今天想做…</h1>
    <p class="lede">依「任務 / 客戶 / 能力 / 程度」篩選真實用例與提示食譜，一鍵複製直接用。</p>
  </header>

  <input class="searchbox" id="gsearch" type="search" placeholder="🔍 搜尋用例或關鍵字（例如：週報、XHS、研究、Library）">

  <div class="filters" id="filters"><!-- 篩選晶片由 app.js 依 recipes.json 生成 --></div>

  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <span class="gcount" id="gcount">載入中…</span>
    <button class="copybtn" id="gclear" type="button">清除篩選</button>
  </div>

  <div class="grid" id="gallery-root" style="margin-top:8px">
    <div class="empty">載入用例中…</div>
  </div>

  <div class="callout tip" style="margin-top:32px"><div class="label">💡 想多學一招？</div><p>每則用例都可一鍵複製、換成你的客戶直接用。想看某個能力的完整說明，回到 <a href="part1.html">功能指南</a>。</p></div>

  <footer>用例藝廊 · 資料來源 recipes.json（單一資料源，可持續擴充）· Mia 團隊說明書</footer>
</div>
<script src="assets/app.js" defer></script>
</body>
</html>
